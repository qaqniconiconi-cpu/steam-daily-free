name: Update All Games (Active + Upcoming + IDs)

on:
  schedule:
    - cron: '0 */4 * * *' # 每4小时自动运行
  workflow_dispatch:      # 允许手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Ultimate Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          from urllib.parse import quote, unquote

          # 伪装成现代浏览器
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/115.0.0.0 Safari/537.36',
              'Accept-Language': 'en-US,en;q=0.9',
          }

          # ==========================================
          # 工具函数
          # ==========================================

          def get_clean_title(title):
              """清理标题中的无关后缀"""
              return re.split(r'\(Steam|\(Epic', title, flags=re.IGNORECASE)[0].strip()

          def resolve_redirect(url):
              """获取重定向后的最终 URL"""
              try:
                  res = requests.head(url, headers=HEADERS, allow_redirects=True, timeout=10)
                  return res.url
              except:
                  return url

          def search_steam_id(title):
              """使用 Steam 搜索 API 获取 ID"""
              try:
                  clean_title = get_clean_title(title)
                  url = f"https://store.steampowered.com/api/storesearch/?term={quote(clean_title)}&l=english&cc=US"
                  res = requests.get(url, headers=HEADERS, timeout=5)
                  data = res.json()
                  if data.get('total', 0) > 0 and len(data.get('items', [])) > 0:
                      return str(data['items'][0]['id'])
              except Exception as e:
                  print(f"    ❌ Steam Search failed: {e}")
              return None

          def get_epic_slug_from_url(url):
              """从 URL 提取 Epic Slug"""
              try:
                  final_url = resolve_redirect(url)
                  # 匹配 /p/ (普通游戏) 或 /bundles/ (捆绑包)
                  match = re.search(r'/(p|bundles)/([^/?#]+)', final_url)
                  if match:
                      return match.group(2)
              except:
                  pass
              return None

          # ==========================================
          # 核心任务 1: 获取正在进行的限免 (Active)
          # ==========================================

          def fetch_active_games():
              print("\n🚀 [Task 1] Fetching Active Games...")
              urls = [
                  "https://www.gamerpower.com/api/giveaways?platform=steam&type=game&sort-by=value",
                  "https://www.gamerpower.com/api/giveaways?platform=epic-games-store&type=game&sort-by=value"
              ]
              
              raw_games = []
              for url in urls:
                  try:
                      raw_games += requests.get(url, headers=HEADERS).json()
                  except: pass

              print(f"📦 Total raw active items: {len(raw_games)}")
              processed = []

              for game in raw_games:
                  new_game = game.copy()
                  title = game.get('title', '')
                  platforms = (game.get('platforms', '') or "").lower()
                  original_url = game.get('open_giveaway_url', '')

                  print(f"Processing: {title[:30]}...")

                  # --- Steam 处理 ---
                  if 'steam' in platforms:
                      # A. 尝试从 URL 提取
                      final_url = resolve_redirect(original_url)
                      match = re.search(r'/app/(\d+)', final_url)
                      if match:
                          new_game['steam_id'] = match.group(1)
                          print(f"    ✅ Steam ID (URL): {new_game['steam_id']}")
                      else:
                          # B. URL 失败，尝试搜索
                          sid = search_steam_id(title)
                          if sid:
                              new_game['steam_id'] = sid
                              print(f"    ✅ Steam ID (Search): {sid}")

                  # --- Epic 处理 ---
                  elif 'epic' in platforms:
                      slug = get_epic_slug_from_url(original_url)
                      if slug:
                          new_game['epic_slug'] = slug
                          print(f"    ✅ Epic Slug: {slug}")
                      else:
                          # C. 最后的兜底：简单的标题转 slug
                          clean_slug = get_clean_title(title).lower().replace(' ', '-')
                          new_game['epic_slug'] = re.sub(r'[^a-z0-9\-]', '', clean_slug)
                          print(f"    ⚠️ Epic Slug (Guessed): {new_game['epic_slug']}")

                  processed.append(new_game)
                  time.sleep(0.5) # 防封

              return processed

          # ==========================================
          # 核心任务 2: 获取即将到来 (Upcoming)
          # ==========================================

          def fetch_upcoming_epic():
              print("\n🚀 [Task 2] Fetching Epic Upcoming...")
              try:
                  url = "https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN"
                  res = requests.get(url, headers=HEADERS).json()
                  
                  elements = res.get('data', {}).get('Catalog', {}).get('searchStore', {}).get('elements', [])
                  upcoming_list = []

                  for item in elements:
                      promotions = item.get('promotions')
                      if not promotions: continue
                      
                      # 只找 upcomingPromotionalOffers
                      upcoming_promos = promotions.get('upcomingPromotionalOffers')
                      if not upcoming_promos: continue

                      # 提取信息
                      start_date = upcoming_promos[0]['promotionalOffers'][0]['startDate']
                      title = item.get('title')
                      
                      # 提取图片
                      img_url = ""
                      for img in item.get('keyImages', []):
                          if img.get('type') in ['Thumbnail', 'OfferImageWide', 'DieselStoreFrontWide']:
                              img_url = img.get('url')
                              break
                      
                      game_info = {
                          "title": title,
                          "description": item.get('description'),
                          "image": img_url,
                          "start_date": start_date,
                          "platform": "Epic Games",
                          "price": "付费" # 预告通常原价不显示或显示为0，这里仅占位
                      }
                      upcoming_list.append(game_info)
                      print(f"  📅 Found Upcoming: {title}")
                  
                  return upcoming_list

              except Exception as e:
                  print(f"❌ Error fetching upcoming: {e}")
                  return []

          # ==========================================
          # 主程序
          # ==========================================
          
          if __name__ == "__main__":
              # 1. 保存 active
              active_data = fetch_active_games()
              with open('games.json', 'w') as f:
                  json.dump(active_data, f, indent=2)
              
              # 2. 保存 upcoming
              upcoming_data = fetch_upcoming_epic()
              with open('upcoming.json', 'w') as f:
                  json.dump(upcoming_data, f, indent=2)
              
              print("\n🎉 All tasks done!")
          EOF

          # 运行脚本
          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add games.json upcoming.json
          # 只有文件变动时才提交，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Active & Upcoming Games" && git push)
