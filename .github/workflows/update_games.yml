// --- 核心工具函数修复 ---
    const formatTime = (dateStr) => {
      if (!dateStr || dateStr === 'N/A') return null; // ⚡ 不显示时间时返回 null
      const date = new Date(dateStr);
      if (isNaN(date.getTime()) || date < new Date()) return null;
      return `${date.getMonth() + 1}月${date.getDate()}日截止`;
    };

    function GameCard({ game, status }) {
      const isSteam = !!game.steam_id;
      const clientUrl = isSteam ? `steam://store/${game.steam_id}` : `com.epicgames.launcher://store/p/${game.epic_slug}`;
      
      let badgeLabel = "喜加一";
      if (status === 'to_paid') badgeLabel = "即将转付费";
      else if (status === 'free_weekend') badgeLabel = "限时免费玩";

      const timeLabel = formatTime(game.end_date);

      return (
        <div className="premium-card group relative bg-gradient-to-br from-white/[0.04] to-transparent border border-white/5 hover:border-white/20 rounded-2xl p-4 sm:p-5 flex flex-col sm:flex-row gap-5 md:gap-6 overflow-hidden backdrop-blur-md transition-all duration-500 hover:-translate-y-1 sm:h-44 w-full">
          <div className="relative shrink-0 rounded-xl overflow-hidden h-40 sm:h-full sm:w-60 bg-[#121215] border border-white/5 z-10">
            <img src={game.thumbnail} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
            <div className="absolute top-2 left-2 px-2.5 py-1 rounded bg-black/60 backdrop-blur-md border border-white/10 text-[10px] font-bold text-white uppercase tracking-widest">
                {badgeLabel}
            </div>
          </div>
          <div className="flex-1 flex flex-col justify-between z-10 min-w-0 py-1">
            <div className="flex flex-col gap-2">
              {/* ⚡ Hover 显示中英文名称 */}
              <div 
                className="text-lg font-bold text-white group-hover:text-amber-500 transition-colors line-clamp-1 cursor-help w-fit"
                title={`${game.en_title} (${game.zh_title})`}
              >
                {game.zh_title || game.title}
              </div>
              {/* ⚡ 备注：仅显示游戏信息 */}
              <div className="text-[0.7rem] text-neutral-400 font-normal line-clamp-2 leading-relaxed">
                {game.short_description || "暂无详细说明，建议立即入库体验。"}
              </div>
              {/* ⚡ 动态显示时间标签：无时间则不显示 */}
              {timeLabel && (
                <div className="flex items-center gap-1.5 text-xs text-amber-500/80 mt-2 font-medium bg-amber-500/5 w-fit px-2 py-1 rounded-md border border-amber-500/10">
                  <Clock className="w-3.5 h-3.5" />
                  <span>{timeLabel}</span>
                </div>
              )}
            </div>
            <div className="mt-4 sm:mt-0 flex justify-end">
              <a href={clientUrl} className="group/btn flex items-center justify-center gap-2 px-5 py-2 rounded-xl font-bold text-sm bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/30 text-neutral-300 hover:text-white transition-all">
                {isSteam ? <SteamIcon className="w-4 h-4 opacity-70" /> : <EpicIcon className="w-4 h-4 opacity-70" />}
                <span className="tracking-wider">一键前往</span>
              </a>
            </div>
          </div>
        </div>
      );
    }

    // --- App 组件渲染逻辑调整 ---
    function App() {
      // ... 之前的 fetchData 逻辑保持不变 ...

      return (
        <div className="min-h-screen bg-[#0a0a0c] text-neutral-200">
          <main className="max-w-[1400px] mx-auto px-6 py-12">
            {/* 1. 喜加一区域 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-20">
              <section>
                <h2 className="text-xl font-bold text-white mb-6 border-b border-white/5 pb-4">Steam 现在可领</h2>
                <div className="flex flex-col gap-5">
                   {data.active.filter(g => g.steam_id).map((g, i) => <GameCard key={i} game={g} status="permanent" />)}
                </div>
              </section>
              <section>
                <h2 className="text-xl font-bold text-white mb-6 border-b border-white/5 pb-4">Epic 现在可领</h2>
                <div className="flex flex-col gap-5">
                   {data.active.filter(g => g.epic_slug).map((g, i) => <GameCard key={i} game={g} status="permanent" />)}
                </div>
              </section>
            </div>

            {/* 2. ⚡ 新增：特工情报分区 */}
            {(data.intel.to_paid.length > 0 || data.intel.free_weekend.length > 0) && (
              <section className="mb-20 bg-white/[0.01] border border-white/5 p-8 rounded-3xl">
                <h2 className="text-xl font-bold text-white mb-8 text-center flex items-center justify-center gap-3">
                  <span className="w-8 h-[1px] bg-gradient-to-r from-transparent to-amber-500"></span>
                  特工情报：转付费 & 限时试玩
                  <span className="w-8 h-[1px] bg-gradient-to-l from-transparent to-amber-500"></span>
                </h2>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  {data.intel.to_paid.map((g, i) => <GameCard key={i} game={g} status="to_paid" />)}
                  {data.intel.free_weekend.map((g, i) => <GameCard key={i} game={g} status="free_weekend" />)}
                </div>
              </section>
            )}

            {/* 3. 即将到来区域 */}
            <section className="mt-20 border-t border-white/5 pt-12">
               {/* ... Upcoming 渲染逻辑 ... */}
            </section>
          </main>
        </div>
      );
    }
