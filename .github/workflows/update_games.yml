name: Update Free Games (With ID Resolver)

on:
  schedule:
    - cron: '0 */4 * * *' # 每4小时运行一次
  workflow_dispatch:      # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Resolve IDs
        run: |
          # 创建 Python 脚本
          cat <<EOF > resolver.py
          import requests
          import json
          import re
          import time

          def resolve_url_and_get_id(game):
              redirect_url = game.get('open_giveaway_url', '')
              if not redirect_url:
                  return game

              try:
                  # 模拟浏览器头，防止被拦截
                  headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
                  }
                  
                  # 发起请求，获取重定向后的最终地址 (allow_redirects=True)
                  # 使用 HEAD 请求比 GET 更快，只获取头信息即可
                  response = requests.head(redirect_url, headers=headers, allow_redirects=True, timeout=10)
                  final_url = response.url
                  
                  # 打印日志方便调试
                  print(f"Resolving: {game['title'][:20]}... -> {final_url}")
                  
                  # --- 提取 Steam ID ---
                  # 格式通常是 store.steampowered.com/app/123456
                  steam_match = re.search(r'/app/(\d+)', final_url)
                  if steam_match:
                      game['steam_id'] = steam_match.group(1)
                      print(f"  -> Found Steam ID: {game['steam_id']}")

                  # --- 提取 Epic Slug ---
                  # 格式通常是 store.epicgames.com/xx/p/slug-name
                  epic_match = re.search(r'/p/([^\/\?]+)', final_url)
                  if epic_match:
                      game['epic_slug'] = epic_match.group(1)
                      print(f"  -> Found Epic Slug: {game['epic_slug']}")
                      
              except Exception as e:
                  print(f"  -> Error resolving {redirect_url}: {e}")
              
              return game

          def main():
              print("Starting data fetch...")
              # 1. 获取原始数据 (Steam + Epic)
              steam_api = "https://www.gamerpower.com/api/giveaways?platform=steam&type=game&sort-by=value"
              epic_api = "https://www.gamerpower.com/api/giveaways?platform=epic-games-store&type=game&sort-by=value"
              
              all_games = []
              
              try:
                  print("Fetching Steam data...")
                  all_games += requests.get(steam_api).json()
              except: pass
              
              try:
                  print("Fetching Epic data...")
                  all_games += requests.get(epic_api).json()
              except: pass

              print(f"Total raw games: {len(all_games)}")

              # 2. 遍历每个游戏，解析真实 ID
              processed_games = []
              for game in all_games:
                  # 复制一份，避免引用问题
                  new_game = game.copy()
                  
                  # 执行解析
                  new_game = resolve_url_and_get_id(new_game)
                  
                  processed_games.append(new_game)
                  # 稍微停顿，礼貌爬取
                  time.sleep(0.5)

              # 3. 保存结果
              with open('games.json', 'w') as f:
                  json.dump(processed_games, f, indent=2)
              
              print("Done! games.json updated.")

          if __name__ == "__main__":
              main()
          EOF

          # 运行脚本
          python resolver.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add games.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update games with resolved IDs" && git push)
