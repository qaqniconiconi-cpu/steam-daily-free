name: Update Free Games (Smart Resolve)

on:
  schedule:
    - cron: '0 */4 * * *' # 每4小时运行
  workflow_dispatch:      # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Analyze Data
        run: |
          # 创建一个 Python 脚本来处理复杂的链接解析
          cat <<EOF > resolver.py
          import requests
          import json
          import re
          import time

          def get_real_url(url):
              try:
                  # 模拟浏览器 User-Agent，防止被拦截
                  headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'}
                  # allow_redirects=True 会自动跟随跳转
                  r = requests.head(url, headers=headers, allow_redirects=True, timeout=10)
                  return r.url
              except:
                  return url

          def process_games():
              # 1. 获取原始数据
              print("Downloading data...")
              steam_url = "https://www.gamerpower.com/api/giveaways?platform=steam&type=game&sort-by=value"
              epic_url = "https://www.gamerpower.com/api/giveaways?platform=epic-games-store&type=game&sort-by=value"
              
              data = []
              try:
                  data += requests.get(steam_url).json()
              except: pass
              
              try:
                  data += requests.get(epic_url).json()
              except: pass

              print(f"Found {len(data)} raw items. resolving real IDs...")

              processed_data = []
              
              for game in data:
                  # 复制一份数据
                  new_game = game.copy()
                  
                  # 原始跳转链接
                  original_url = game.get('open_giveaway_url', '')
                  
                  # --- Steam ID 解析 ---
                  # 如果是 Steam 平台，我们需要解析出 ID
                  if 'steam' in game.get('platforms', '').lower() or 'steam' in game.get('title', '').lower():
                      real_url = get_real_url(original_url)
                      # 正则提取 /app/123456
                      match = re.search(r'/app/(\d+)', real_url)
                      if match:
                          new_game['steam_id'] = match.group(1)
                          print(f"✅ Steam ID found: {new_game['steam_id']} ({game['title']})")
                      else:
                          print(f"⚠️ No Steam ID in: {real_url}")

                  # --- Epic 解析 ---
                  elif 'epic' in game.get('platforms', '').lower():
                      # Epic 不需要解析跳转，直接从链接提取 slug 即可，通常 GamerPower 的 Epic 链接还算比较规范
                      # 如果需要，也可以在这里加解析逻辑
                      pass

                  processed_data.append(new_game)
                  # 稍微停顿一下，防止请求太快被封
                  time.sleep(0.5)

              # 保存结果
              with open('games.json', 'w') as f:
                  json.dump(processed_data, f, indent=2)
              print("Done!")

          if __name__ == "__main__":
              process_games()
          EOF

          # 运行上面生成的 Python 脚本
          python resolver.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add games.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update games with Real IDs" && git push)
