name: Update Games (Pro Filter & Anti-Block)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          import xml.etree.ElementTree as ET
          from urllib.parse import quote
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              try:
                  url_zh = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res_zh = requests.get(url_zh, headers=HEADERS, timeout=10).json()
                  url_en = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=english"
                  res_en = requests.get(url_en, headers=HEADERS, timeout=10).json()

                  if str(app_id) in res_zh and res_zh[str(app_id)]['success']:
                      d = res_zh[str(app_id)]['data']
                      d_en = res_en[str(app_id)]['data'] if str(app_id) in res_en else {}
                      
                      end_date = "N/A"
                      price_info = d.get('price_overview', {})
                      # 获取折扣过期时间
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          end_date = datetime.fromtimestamp(int(expiry_ts)).strftime('%Y-%m-%dT%H:%M:%SZ')

                      # 提取描述
                      raw_desc = d.get('short_description', '')
                      clean_desc = re.sub('<[^<]+?>', '', raw_desc).replace('\r', '').replace('\n', '').strip()
                      short_desc = clean_desc.split('。')[0] if '。' in clean_desc else clean_desc

                      # ⚡ 增强免费判定：增加 final == 0 的检查，覆盖试玩游戏
                      is_currently_free = (
                          d.get('is_free', False) or 
                          price_info.get('discount_percent') == 100 or 
                          price_info.get('final') == 0
                      )

                      return {
                          "zh_title": d.get('name'),
                          "en_title": d_en.get('name', d.get('name')),
                          "thumbnail": d.get('header_image'),
                          "short_description": short_desc,
                          "type": d.get('type', 'game'),
                          "is_free": is_currently_free,
                          "end_date": end_date
                      }
              except: 
                  pass
              return None

          def fetch_epic_official():
              active, upcoming = [], []
              try:
                  res = requests.get("https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN", headers=HEADERS).json()
                  for item in res['data']['Catalog']['searchStore']['elements']:
                      promos = item.get('promotions')
                      if not promos: continue
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      slug = item.get('productSlug') or (item.get('catalogNs', {}).get('mappings', [{}])[0].get('pageSlug')) or item.get('urlSlug')
                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active.append({"zh_title": item['title'], "en_title": item['title'], "thumbnail": img, "end_date": offers[0]['endDate'], "epic_slug": slug, "short_description": "Epic 平台限免作品"})
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming.append({"zh_title": item['title'], "image": img, "start_date": offers[0]['startDate'], "platform": "Epic Games", "short_description": "即将开启免费领取"})
              except: 
                  pass
              return active, upcoming

          def fetch_intel_ids():
              ids = []
              sources = ["https://www.reddit.com/r/FreeGameFindings/new.rss", "https://www.reddit.com/r/GameDeals/new.rss", "https://keylol.com/forum.php?mod=rss&fid=319"]
              for url in sources:
                  try:
                      res = requests.get(url, headers=HEADERS, timeout=15)
                      ids.extend(re.findall(r'app/(\d+)', res.text))
                  except: 
                      pass
              return list(set(ids))

          def upload_to_api(filename, data):
              url = "https://system.et-api.com/v1/update/steam-daily-free"
              headers = {"filename": filename, "Content-Type": "application/json"}
              try: 
                  requests.post(url, headers=headers, json=data, timeout=15)
              except: 
                  pass

          def main():
              print("🚀 Starting Intelligence Sync...")
              # 定义已知分类，辅助脚本判断
              WEEKEND_IDS = ["255710", "780310", "493340"]
              TO_PAID_IDS = ["2366060"]
              
              probe_ids = list(set(fetch_intel_ids() + TO_PAID_IDS + WEEKEND_IDS))
              final_to_paid, final_weekend = [], []
              
              for app_id in probe_ids:
                  info = get_steam_details(app_id)
                  # ⚡ 过滤 DLC，仅保留游戏本体
                  if info and info['is_free'] and info['type'] == 'game':
                      item = {
                          "steam_id": app_id, 
                          "zh_title": info['zh_title'], 
                          "en_title": info['en_title'], 
                          "thumbnail": info['thumbnail'], 
                          "short_description": info['short_description'], 
                          "end_date": info['end_date']
                      }
                      
                      # ⚡ 改进分类逻辑：优先匹配已知试玩 ID 或具有截止日期的条目
                      if app_id in WEEKEND_IDS or info['end_date'] != "N/A":
                          final_weekend.append(item)
                      else:
                          final_to_paid.append(item)

              active_games = []
              try:
                  gp = requests.get("https://www.gamerpower.com/api/giveaways?platform=steam", headers=HEADERS).json()
                  for g in gp:
                      if g.get('type') == 'Game':
                          m = re.search(r'app/(\d+)', g.get('open_giveaway_url', ''))
                          if m:
                              s = get_steam_details(m.group(1))
                              if s: active_games.append({
                                  "steam_id": m.group(1), 
                                  "zh_title": s['zh_title'], 
                                  "en_title": s['en_title'], 
                                  "thumbnail": s['thumbnail'], 
                                  "end_date": s['end_date'], 
                                  "short_description": s['short_description'], 
                                  "open_giveaway_url": g.get('open_giveaway_url')
                              })
              except: 
                  pass

              epic_a, epic_u = fetch_epic_official()
              active_games.extend(epic_a)

              upload_to_api("games.json", active_games)
              upload_to_api("upcoming.json", epic_u)
              upload_to_api("intel.json", {"to_paid": final_to_paid, "free_weekend": final_weekend})
              print("🎉 Intel Updated!")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add *.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Restore Free Weekend content and Fix logic" && git push)
