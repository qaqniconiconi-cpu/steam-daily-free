name: Update Games (Logic Fix & Drawer UI)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          from urllib.parse import quote
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              try:
                  url_zh = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res_zh = requests.get(url_zh, headers=HEADERS, timeout=10).json()
                  url_en = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=english"
                  res_en = requests.get(url_en, headers=HEADERS, timeout=10).json()

                  if str(app_id) in res_zh and res_zh[str(app_id)]['success']:
                      d = res_zh[str(app_id)]['data']
                      d_en = res_en[str(app_id)]['data'] if str(app_id) in res_en else {}
                      
                      # ⚡ 核心逻辑 1：识别免费授权包 (限时试玩标志)
                      is_free_license = False
                      for group in d.get('package_groups', []):
                          for sub in group.get('subs', []):
                              if sub.get('is_free_license') == True:
                                  is_free_license = True
                                  break

                      price_info = d.get('price_overview', {})
                      # ⚡ 核心逻辑 2：识别 100% 折扣 (永久入库/喜加一标志)
                      is_100_discount = price_info.get('discount_percent') == 100
                      is_currently_free = d.get('is_free', False) or is_100_discount or is_free_license

                      end_date = "N/A"
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          end_date = datetime.fromtimestamp(int(expiry_ts)).strftime('%Y-%m-%dT%H:%M:%SZ')

                      raw_desc = d.get('short_description', '')
                      clean_desc = re.sub('<[^<]+?>', '', raw_desc).replace('\r', '').replace('\n', '').strip()
                      short_desc = clean_desc.split('。')[0] if '。' in clean_desc else clean_desc
                      
                      is_weekend_kw = any(kw in clean_desc.lower() for kw in ['免费周末', '免费试玩', 'free weekend', 'play for free'])

                      return {
                          "zh_title": d.get('name'),
                          "en_title": d_en.get('name', d.get('name')),
                          "thumbnail": d.get('header_image'),
                          "short_description": short_desc,
                          "type": d.get('type', 'game'),
                          "is_free": is_currently_free,
                          "is_100_discount": is_100_discount,
                          "is_weekend": is_weekend_kw or is_free_license,
                          "end_date": end_date
                      }
              except: pass
              return None

          def main():
              print("🚀 启动情报分类引擎...")
              probe_ids = list(set(["2366060", "255710", "780310", "493340"])) # 基础监控
              
              # 深度探测
              for url in ["https://www.reddit.com/r/FreeGameFindings/new.rss", "https://keylol.com/forum.php?mod=rss&fid=319"]:
                  try:
                      res = requests.get(url, headers=HEADERS, timeout=15)
                      probe_ids.extend(re.findall(r'app/(\d+)', res.text))
                  except: pass
              
              active_games, f_to_paid, f_weekend = [], [], []
              
              for app_id in set(probe_ids):
                  info = get_steam_details(app_id)
                  if info and info['is_free'] and info['type'] == 'game':
                      item = {
                          "steam_id": app_id, "zh_title": info['zh_title'], "en_title": info['en_title'], 
                          "thumbnail": info['thumbnail'], "short_description": info['short_description'], 
                          "end_date": info['end_date']
                      }
                      # ⚡ 重新分流逻辑
                      if info['is_100_discount']:
                          # 只有真正的喜加一进入 active_games
                          active_games.append({**item, "open_giveaway_url": f"https://store.steampowered.com/app/{app_id}"})
                      elif info['is_weekend']:
                          # 试玩游戏进入 weekend
                          f_weekend.append(item)
                      elif info['end_date'] == "N/A":
                          # 即将转付费
                          f_to_paid.append(item)

              # 合并 Epic 和 GamerPower 数据...
              try:
                  gp = requests.get("https://www.gamerpower.com/api/giveaways?platform=steam", headers=HEADERS).json()
                  for g in gp:
                      if g.get('type') == 'Game':
                          m = re.search(r'app/(\d+)', g['open_giveaway_url'])
                          if m:
                              s = get_steam_details(m.group(1))
                              if s: active_games.append({**item, "open_giveaway_url": g['open_giveaway_url']})
              except: pass

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data, timeout=15)

              upload("games.json", active_games)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})
              print("🎉 Intel Categorized Correctly!")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add *.json || true
          git commit -m "Fix categorization logic" || true
          git push
