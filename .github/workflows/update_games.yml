name: Update Free Games (Fix Epic)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          from urllib.parse import quote

          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0'}

          def get_clean_title(title):
              # 去掉 "(Steam) Giveaway", "(Epic Games)" 等后缀
              title = re.split(r'\(Steam|\(Epic', title, flags=re.IGNORECASE)[0]
              return title.strip()

          def search_steam_id(title):
              """Steam 仍然使用搜索 API，因为最准"""
              clean_title = get_clean_title(title)
              try:
                  url = f"https://store.steampowered.com/api/storesearch/?term={quote(clean_title)}&l=english&cc=US"
                  data = requests.get(url, headers=HEADERS, timeout=5).json()
                  if data.get('total', 0) > 0:
                      return str(data['items'][0]['id'])
              except:
                  pass
              return None

          def guess_epic_slug(title):
              """Epic 使用标题转 Slug 策略"""
              clean_title = get_clean_title(title)
              # 1. 转小写
              slug = clean_title.lower()
              # 2. 替换非字母数字的字符为横杠
              slug = re.sub(r'[^a-z0-9]+', '-', slug)
              # 3. 去掉首尾横杠
              slug = slug.strip('-')
              return slug

          def main():
              print("Fetching data...")
              urls = [
                  "https://www.gamerpower.com/api/giveaways?platform=steam&type=game&sort-by=value",
                  "https://www.gamerpower.com/api/giveaways?platform=epic-games-store&type=game&sort-by=value"
              ]
              
              all_games = []
              for url in urls:
                  try:
                      all_games += requests.get(url, headers=HEADERS).json()
                  except: pass

              print(f"Total raw items: {len(all_games)}")
              processed = []

              for game in all_games:
                  new_game = game.copy()
                  title = game.get('title', '')
                  platforms = game.get('platforms', '').lower()
                  
                  # --- 处理 Steam ---
                  if 'steam' in platforms:
                      # 既然搜索很准，直接用搜索
                      sid = search_steam_id(title)
                      if sid:
                          new_game['steam_id'] = sid
                          print(f"✅ Steam ID: {sid} for {title}")

                  # --- 处理 Epic ---
                  elif 'epic' in platforms:
                      # 使用猜测策略
                      slug = guess_epic_slug(title)
                      if slug:
                          new_game['epic_slug'] = slug
                          print(f"✅ Epic Slug: {slug} for {title}")

                  processed.append(new_game)
                  time.sleep(0.2)

              with open('games.json', 'w') as f:
                  json.dump(processed, f, indent=2)
              print("Done!")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add games.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update IDs" && git push)
