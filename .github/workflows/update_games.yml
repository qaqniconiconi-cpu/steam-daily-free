name: Update Games (Time Machine Search)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              """完全依靠 API 字段进行自动化身份识别"""
              try:
                  url = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res = requests.get(url, headers=HEADERS, timeout=10).json()
                  if str(app_id) in res and res[str(app_id)]['success']:
                      d = res[str(app_id)]['data']
                      price_info = d.get('price_overview', {})
                      
                      # 1. 识别【限时喜加一】标志：折扣为 100%
                      is_100_off = price_info.get('discount_percent') == 100
                      
                      # 2. 识别【限时试玩】标志：扫描 package_groups 里的免费授权包
                      is_weekend_sub = False
                      for group in d.get('package_groups', []):
                          for sub in group.get('subs', []):
                              if sub.get('is_free_license') is True:
                                  is_weekend_sub = True
                                  break

                      end_date = "N/A"
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          end_date = datetime.fromtimestamp(int(expiry_ts)).strftime('%Y-%m-%dT%H:%M:%SZ')

                      raw_desc = d.get('short_description', '')
                      clean_desc = re.sub('<[^<]+?>', '', raw_desc).replace('\r', '').replace('\n', '').strip()
                      short_desc = clean_desc.split('。')[0] if '。' in clean_desc else clean_desc
                      
                      is_weekend_kw = any(kw in clean_desc.lower() for kw in ['免费周末', '免费试玩', 'free weekend'])

                      return {
                          "zh_title": d.get('name'),
                          "thumbnail": d.get('header_image'),
                          "short_description": short_desc,
                          "type": d.get('type', 'game'),
                          "is_100_off": is_100_off,
                          "is_weekend": is_weekend_sub or (is_weekend_kw and not is_100_off),
                          "end_date": end_date,
                          "is_free": d.get('is_free', False) or is_100_off or is_weekend_sub
                      }
              except: pass
              return None

          def fetch_rss_ids():
              """⚡ 时光机雷达：不仅看最新，还深度检索过去一个月的老帖子"""
              ids = []
              sources = [
                  # 常规最新订阅
                  "https://www.reddit.com/r/FreeGameFindings/new.rss",
                  "https://www.reddit.com/r/GameDeals/new.rss",
                  "https://keylol.com/forum.php?mod=rss&fid=319",
                  # ⚡ 深度检索引擎：强制把过去 30 天内所有转付费和试玩的情报全挖出来
                  "https://www.reddit.com/r/FreeGameFindings/search.rss?q=flair:F2P+To+Paid&restrict_sr=on&sort=new&t=month",
                  "https://www.reddit.com/r/FreeGameFindings/search.rss?q=flair:Free+Weekend&restrict_sr=on&sort=new&t=month"
              ]
              for url in sources:
                  try:
                      res = requests.get(url, headers=HEADERS, timeout=15).text
                      ids.extend(re.findall(r'app/(\d+)', res))
                  except: pass
              return list(set(ids))

          def main():
              print("🚀 启动时光机情报检索系统...")
              
              # 1. 记忆系统：读取你服务器上现有的数据
              existing_ids = []
              try:
                  old_data = requests.get("https://system.et-api.com/v1/get/steam-daily-free?filename=intel.json", headers=HEADERS, timeout=10).json()
                  existing_ids.extend([i['steam_id'] for i in old_data.get('to_paid', [])])
                  existing_ids.extend([i['steam_id'] for i in old_data.get('free_weekend', [])])
              except: pass

              # 2. 时光机扫描系统
              new_ids = fetch_rss_ids()
              
              probe_ids = list(set(existing_ids + new_ids))
              probe_ids = [uid for uid in probe_ids if uid]
              
              active_games, f_to_paid, f_weekend = [], [], []
              
              for app_id in probe_ids:
                  info = get_steam_details(app_id)
                  # 只有游戏本体且处于免费状态的才会留下
                  if not info or info['type'] != 'game': continue
                  if not info['is_free']: continue

                  item = {
                      "steam_id": app_id, "zh_title": info['zh_title'],
                      "thumbnail": info['thumbnail'], "short_description": info['short_description'],
                      "end_date": info['end_date']
                  }

                  # 自动化精准分流
                  if info['is_100_off']:
                      active_games.append({**item, "open_giveaway_url": f"https://store.steampowered.com/app/{app_id}"})
                  elif info['is_weekend']:
                      f_weekend.append(item)
                  elif info['end_date'] == "N/A":
                      f_to_paid.append(item)

              # Epic 常规抓取
              upcoming_list = []
              try:
                  res = requests.get("https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN", headers=HEADERS).json()
                  for item in res['data']['Catalog']['searchStore']['elements']:
                      promos = item.get('promotions')
                      if not promos: continue
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      slug = item.get('productSlug') or item.get('urlSlug')
                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active_games.append({"zh_title": item['title'], "thumbnail": img, "end_date": offers[0]['endDate'], "epic_slug": slug, "short_description": "Epic 平台限时免费领取"})
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming_list.append({"zh_title": item['title'], "image": img, "start_date": offers[0]['startDate'], "platform": "Epic Games", "short_description": "即将开启免费领取"})
              except: pass

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data, timeout=15)

              upload("games.json", active_games)
              upload("upcoming.json", upcoming_list)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})
              print("🎉 时光机检索完成，数据已上传！")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git add *.json || true
          git commit -m "Add Time Machine RSS Search" || true
          git push
