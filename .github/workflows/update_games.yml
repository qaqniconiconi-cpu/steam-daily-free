name: Update Games (Fix Crowalt Date Format)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          from datetime import datetime

          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)', 'Accept-Language': 'en-US,en;q=0.9'}
          COOKIES = {'birthtime': '283993201', 'wants_mature_content': '1'}
          API_BASE = 'https://system.et-api.com/v1/get/steam-daily-free'

          def parse_text_date(text):
              months = {"jan":1, "feb":2, "mar":3, "apr":4, "may":5, "jun":6, "jul":7, "aug":8, "sep":9, "oct":10, "nov":11, "dec":12}
              
              # ⚡ 核心修复：同时支持 "Oct 24" 和 Steam 专用的 "24 Oct" 格式
              m1 = re.search(r'(?:until|ends|before|exp\.|expires|on|starting|after|as\s+of)\s+([a-zA-Z]{3,})\s+(\d+)', text, re.IGNORECASE)
              m2 = re.search(r'(?:until|ends|before|exp\.|expires|on|starting|after|as\s+of)\s+(\d+)\s+([a-zA-Z]{3,})', text, re.IGNORECASE)
              
              if m1:
                  m_str, d_str = m1.group(1).lower()[:3], int(m1.group(2))
              elif m2:
                  d_str, m_str = int(m2.group(1)), m2.group(2).lower()[:3]
              else:
                  return "N/A"
                  
              if m_str in months:
                  now = datetime.utcnow()
                  y, m = now.year, months[m_str]
                  if m < now.month - 2: y += 1
                  try: return datetime(y, m, d_str, 17, 0, 0).strftime('%Y-%m-%dT%H:%M:%SZ')
                  except: pass
              return "N/A"

          def get_steam_details(app_id, old_time="N/A"):
              try:
                  url = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res = requests.get(url, headers=HEADERS, timeout=10).json()
                  if str(app_id) not in res or not res[str(app_id)]['success']: return None
                  d = res[str(app_id)]['data']
                  if d.get('type') != 'game': return None
                  
                  price = d.get('price_overview', {})
                  is_100_off = price.get('discount_percent') == 100
                  is_store_free = d.get('is_free', False)
                  if not (is_store_free or is_100_off): return None

                  end_date = "N/A"
                  if price.get('discount_expiration'):
                      end_date = datetime.fromtimestamp(int(price['discount_expiration'])).strftime('%Y-%m-%dT%H:%M:%SZ')
                  
                  # ⚡ 网页强行刮削：无条件对所有未获取到时间的免费游戏查网页
                  if end_date == "N/A":
                      try:
                          h = requests.get(f"https://store.steampowered.com/app/{app_id}?l=english", headers=HEADERS, cookies=COOKIES, timeout=5).text
                          
                          # 如果网页有保留字眼，强制归为“现在可领”(喜加一)
                          if "Free to keep" in h or "100% off" in h:
                              is_100_off = True
                              
                          tm = re.search(r'DiscountEndDate\s*=\s*(\d+)', h) or re.search(r'data-ds-discount-end="(\d+)"', h)
                          if tm: 
                              end_date = datetime.fromtimestamp(int(tm.group(1))).strftime('%Y-%m-%dT%H:%M:%SZ')
                          else:
                              # 从 HTML 横幅暴力提取日期 (解决 Crowalt 问题)
                              ban = re.search(r'game_purchase_discount_countdown[^>]*>([^<]+)<', h)
                              if ban: end_date = parse_text_date(ban.group(1))
                              if end_date == "N/A":
                                  ftk = re.search(r'Free to keep when you get it before([^<]+)', h, re.IGNORECASE)
                                  if ftk: end_date = parse_text_date("before " + ftk.group(1))
                      except: pass

                  if end_date == "N/A":
                      try:
                          news = requests.get(f"https://api.steampowered.com/ISteamNews/GetNewsForApp/v0002/?appid={app_id}&count=10", timeout=5).json()
                          for item in news.get('appnews', {}).get('newsitems', []):
                              d_news = parse_text_date(item.get('title', '') + " " + item.get('contents', ''))
                              if d_news != "N/A": end_date = d_news; break
                      except: pass
                  
                  if end_date == "N/A" and old_time != "N/A": end_date = old_time

                  return {
                      "steam_id": str(app_id), "zh_title": d.get('name'), "thumbnail": d.get('header_image'),
                      "short_description": d.get('short_description', '').strip().split('。')[0],
                      "is_100_off": is_100_off, "end_date": end_date,
                      "is_weekend": is_store_free and price.get('final', 0) > 0 and not is_100_off
                  }
              except: return None

          def main():
              memory = {}
              try:
                  for fn in ["games.json", "intel.json"]:
                      old = requests.get(f"{API_BASE}?filename={fn}", timeout=10).json()
                      items = old if isinstance(old, list) else (old.get('to_paid', []) + old.get('free_weekend', []))
                      for i in items:
                          if i.get('steam_id'): memory[i['steam_id']] = i.get('end_date', "N/A")
              except: pass

              ids = set(memory.keys())
              try:
                  res = requests.get("https://keylol.com/forum.php?mod=rss&fid=319", timeout=15).text
                  ids.update(re.findall(r'app/(\d+)', res))
              except: pass

              active_games, f_to_paid, f_weekend = [], [], []
              for app_id in ids:
                  info = get_steam_details(app_id, memory.get(app_id, "N/A"))
                  if info:
                      if info['is_100_off']: active_games.append(info)
                      elif info['is_weekend']: f_weekend.append(info)
                      else: f_to_paid.append(info)

              upcoming_list = []
              try:
                  res = requests.get("https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN", timeout=15).json()
                  for item in res['data']['Catalog']['searchStore']['elements']:
                      promos = item.get('promotions')
                      if not promos: continue
                      
                      mappings = item.get('catalogNs', {}).get('mappings', [])
                      slug = mappings[0].get('pageSlug') if mappings else None
                      slug = slug or item.get('productSlug') or item.get('urlSlug') or "free-games"
                      
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      
                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active_games.append({"zh_title": item['title'], "thumbnail": img, "end_date": offers[0]['endDate'], "epic_slug": slug, "short_description": "Epic 平台限时免费领取"})
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming_list.append({"zh_title": item['title'], "image": img, "start_date": offers[0]['startDate'], "platform": "Epic Games", "epic_slug": slug, "short_description": "即将开启免费领取"})
              except: pass

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data)

              upload("games.json", active_games)
              upload("upcoming.json", upcoming_list)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})
          if __name__ == "__main__": main()
          EOF
          python processor.py
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git add *.json || true
          git commit -m "Fix Crowalt Date Format & Scrape Logic" || true
          git push
