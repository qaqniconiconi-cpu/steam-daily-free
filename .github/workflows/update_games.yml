name: Update Games (Max Time Info & Auto Category)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              try:
                  url_zh = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res_zh = requests.get(url_zh, headers=HEADERS, timeout=10).json()
                  url_en = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=english"
                  res_en = requests.get(url_en, headers=HEADERS, timeout=10).json()

                  if str(app_id) in res_zh and res_zh[str(app_id)]['success']:
                      d = res_zh[str(app_id)]['data']
                      d_en = res_en[str(app_id)]['data'] if str(app_id) in res_en else {}
                      
                      price_info = d.get('price_overview', {})
                      is_100_off = price_info.get('discount_percent') == 100
                      is_store_free = d.get('is_free', False)
                      is_currently_free = is_store_free or is_100_off
                      
                      is_weekend = is_store_free and bool(price_info) and price_info.get('final', 0) > 0 and not is_100_off

                      end_date = "N/A"
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          end_date = datetime.fromtimestamp(int(expiry_ts)).strftime('%Y-%m-%dT%H:%M:%SZ')

                      raw_desc = d.get('short_description', '')
                      clean_desc = re.sub('<[^<]+?>', '', raw_desc).replace('\r', '').replace('\n', '').strip()
                      short_desc = clean_desc.split('。')[0] if '。' in clean_desc else clean_desc

                      return {
                          "zh_title": d.get('name'), "en_title": d_en.get('name', d.get('name')),
                          "thumbnail": d.get('header_image'), "short_description": short_desc,
                          "type": d.get('type', 'game'), "is_100_off": is_100_off,
                          "is_weekend": is_weekend, "end_date": end_date, "is_free": is_currently_free
                      }
              except: pass
              return None

          def fetch_intel_ids():
              ids = []
              sources = [
                  "https://www.reddit.com/r/FreeGameFindings/search.rss?q=flair%3A%22F2P+To+Paid%22+OR+flair%3A%22Free+Weekend%22&restrict_sr=on&sort=new&t=month",
                  "https://www.reddit.com/r/FreeGameFindings/search.rss?q=flair%3A%22Steam%22&restrict_sr=on&sort=new&t=week",
                  "https://www.reddit.com/r/GameDeals/search.rss?q=title%3A%22100%25%22+OR+title%3A%22free%22+OR+title%3A%22weekend%22&restrict_sr=on&sort=new&t=week",
                  "https://keylol.com/forum.php?mod=rss&fid=319",
                  "https://www.ozbargain.com.au/cat/gaming/feed",
                  "https://steamcommunity.com/groups/freegamesfinders/rss",
                  "https://steamcommunity.com/groups/GrabTheGames/rss"
              ]
              for url in sources:
                  try:
                      ids.extend(re.findall(r'app/(\d+)', requests.get(url, headers=HEADERS, timeout=15).text))
                  except: pass
              return list(set(ids))

          def main():
              existing_ids = []
              try:
                  old_intel = requests.get("https://system.et-api.com/v1/get/steam-daily-free?filename=intel.json", headers=HEADERS, timeout=10).json()
                  existing_ids.extend([i['steam_id'] for i in old_intel.get('to_paid', [])] + [i['steam_id'] for i in old_intel.get('free_weekend', [])])
                  old_games = requests.get("https://system.et-api.com/v1/get/steam-daily-free?filename=games.json", headers=HEADERS, timeout=10).json()
                  existing_ids.extend([g['steam_id'] for g in old_games if g.get('steam_id')])
              except: pass

              # ⚡ 核心兜底引擎：提前把全球数据库的时间都存下来
              gp_dict = {}
              try:
                  gp = requests.get("https://www.gamerpower.com/api/giveaways?platform=steam", headers=HEADERS).json()
                  for g in gp:
                      if g.get('type') == 'Game':
                          m = re.search(r'app/(\d+)', g.get('open_giveaway_url', ''))
                          if m: gp_dict[m.group(1)] = g
              except: pass

              probe_ids = list(set(existing_ids + fetch_intel_ids()))
              active_games, f_to_paid, f_weekend = [], [], []
              
              for app_id in probe_ids:
                  info = get_steam_details(app_id)
                  if info and info['type'] == 'game' and info['is_free']:
                      
                      # ⚡ 时间抢救：如果 Steam 没给时间，立刻用第三方数据库兜底
                      if info['end_date'] == "N/A" and app_id in gp_dict:
                          gp_end = gp_dict[app_id].get('end_date', 'N/A')
                          if gp_end != 'N/A' and gp_end:
                              info['end_date'] = gp_end.replace(' ', 'T') + 'Z'

                      item = {"steam_id": app_id, "zh_title": info['zh_title'], "en_title": info['en_title'], "thumbnail": info['thumbnail'], "short_description": info['short_description'], "end_date": info['end_date']}
                      if info['is_100_off']: active_games.append({**item, "open_giveaway_url": f"https://store.steampowered.com/app/{app_id}"})
                      elif info['is_weekend']: f_weekend.append(item)
                      else: f_to_paid.append(item)

              # 把那些仅存在于第三方数据库的游戏也补进来
              for app_id, g in gp_dict.items():
                  if not any(x['steam_id'] == app_id for x in active_games):
                      s = get_steam_details(app_id)
                      if s and s['type'] == 'game' and s['is_100_off']:
                          gp_end = g.get('end_date', 'N/A')
                          if gp_end != 'N/A' and gp_end:
                              s['end_date'] = gp_end.replace(' ', 'T') + 'Z'
                          active_games.append({
                              "steam_id": app_id, "zh_title": s['zh_title'], "en_title": s['en_title'], 
                              "thumbnail": s['thumbnail'], "short_description": s['short_description'], 
                              "end_date": s['end_date'], "open_giveaway_url": g.get('open_giveaway_url')
                          })

              upcoming_list = []
              try:
                  res = requests.get("https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN", headers=HEADERS).json()
                  for item in res['data']['Catalog']['searchStore']['elements']:
                      promos = item.get('promotions')
                      if not promos: continue
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      slug = item.get('productSlug') or item.get('urlSlug')
                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active_games.append({"zh_title": item['title'], "en_title": item['title'], "thumbnail": img, "end_date": offers[0]['endDate'], "epic_slug": slug, "short_description": "Epic 平台限时免费领取"})
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming_list.append({"zh_title": item['title'], "image": img, "start_date": offers[0]['startDate'], "platform": "Epic Games", "short_description": "即将开启免费领取"})
              except: pass

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data, timeout=15)

              upload("games.json", active_games)
              upload("upcoming.json", upcoming_list)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})
              print("🎉 雷达扫描与数据分类已完成！")

          if __name__ == "__main__":
              main()
          EOF
          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git add *.json || true
          git commit -m "Max Time preservation logic" || true
          git push
