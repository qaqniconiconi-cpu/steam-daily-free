import requests
import re
import json
import time

# 使用非常真实的浏览器头，否则 Epic 会拦截请求
HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
}

def get_full_epic_slug(url):
    try:
        # 必须使用 GET 而不是 HEAD，因为有些中间件只在 GET 时跳转
        # timeout 增加到 15 秒，Epic 的跳转链有时很慢
        res = requests.get(url, headers=HEADERS, allow_redirects=True, timeout=15)
        final_url = res.url
        
        # 匹配 /p/ 或 /product/ 后面直到斜杠或问号的所有内容
        # 这将捕获包含 "-6df09f" 这种后缀的完整 Slug
        match = re.search(r'/(p|product)/([a-zA-Z0-9\-\%]+)', final_url)
        if match:
            slug = match.group(2)
            print(f"    ✅ 抓取到真实 Slug: {slug}")
            return slug
    except Exception as e:
        print(f"    ❌ 解析失败: {e}")
    return None

