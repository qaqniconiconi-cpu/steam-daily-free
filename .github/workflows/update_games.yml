name: Update Games (Full Auto & Live Time)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          import xml.etree.ElementTree as ET
          from urllib.parse import quote
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              """⚡ 全自动核心：获取名称、图片、描述及【确切截止时间】"""
              try:
                  url = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res = requests.get(url, headers=HEADERS, timeout=10).json()
                  if str(app_id) in res and res[str(app_id)]['success']:
                      data = res[str(app_id)]['data']
                      
                      # 1. 提取截止时间 (Steam 100%折扣截止时间戳)
                      end_date = "N/A"
                      price_info = data.get('price_overview', {})
                      # discount_expiration 是 Unix 时间戳
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          dt_obj = datetime.fromtimestamp(int(expiry_ts))
                          end_date = dt_obj.strftime('%Y-%m-%dT%H:%M:%SZ')

                      return {
                          "name": data.get('name'),
                          "image": data.get('header_image'),
                          "desc": data.get('short_description', '').split('\r')[0].strip(),
                          "is_free": data.get('is_free', False) or price_info.get('discount_percent') == 100,
                          "end_date": end_date
                      }
              except:
                  pass
              return None

          def fetch_epic_official():
              active_epic, upcoming_epic = [], []
              try:
                  url = "https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN"
                  res = requests.get(url, headers=HEADERS).json()
                  elements = res['data']['Catalog']['searchStore']['elements']
                  for item in elements:
                      promos = item.get('promotions')
                      if not promos: continue
                      
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      slug = item.get('productSlug') or (item.get('catalogNs', {}).get('mappings', [{}])[0].get('pageSlug')) or item.get('urlSlug')

                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active_epic.append({
                                  "zh_title": item['title'], "thumbnail": img,
                                  "end_date": offers[0]['endDate'], "epic_slug": slug,
                                  "short_description": "Epic 每周限时喜加一福利"
                              })
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming_epic.append({
                                  "zh_title": item['title'], "image": img,
                                  "start_date": offers[0]['startDate'], "platform": "Epic Games",
                                  "short_description": "即将开启的 Epic 免费领取活动"
                              })
              except Exception as e: print(f"Epic Error: {e}")
              return active_epic, upcoming_epic

          def fetch_intel_ids():
              print("正在全网嗅探最新情报...")
              to_paid_ids, weekend_ids = [], []
              sources = ["https://www.reddit.com/r/FreeGameFindings/new.rss", "https://keylol.com/forum.php?mod=rss&fid=319"]
              for url in sources:
                  try:
                      res = requests.get(url, headers=HEADERS, timeout=15)
                      # 简单的正则从 RSS 内容中提取 app/ID
                      matches = re.findall(r'app/(\d+)', res.text)
                      to_paid_ids.extend(matches)
                      weekend_ids.extend(matches)
                  except: pass
              return list(set(to_paid_ids)), list(set(weekend_ids))

          def upload_to_api(filename, data):
              url = "https://system.et-api.com/v1/update/steam-daily-free"
              headers = {"filename": filename, "Content-Type": "application/json"}
              try: requests.post(url, headers=headers, json=data, timeout=15)
              except: pass

          def main():
              print("🚀 Starting Fully Automated Sync...")
              current_time = int(time.time())
              
              # 1. 处理情报 (自动抓取时间与描述)
              new_paid_raw, new_weekend_raw = fetch_intel_ids()
              # 保持一些活跃探测 ID，防止 RSS 更新太快漏抓
              probe_ids = list(set(new_paid_raw + new_weekend_raw + ["2366060", "255710", "780310", "493340"]))
              
              final_to_paid, final_weekend = [], []
              for app_id in probe_ids:
                  info = get_steam_details(app_id)
                  if info and info['is_free']:
                      item = {
                          "steam_id": app_id, "zh_title": info['name'],
                          "thumbnail": info['image'], "short_description": info['desc'],
                          "end_date": info['end_date'], "added_at": current_time
                      }
                      # 区分转付费还是试玩：通常转付费的游戏没有 end_date（长期免费）
                      if info['end_date'] == "N/A": final_to_paid.append(item)
                      else: final_weekend.append(item)

              # 2. 处理常规白嫖
              final_active = []
              try:
                  gp_res = requests.get("https://www.gamerpower.com/api/giveaways?platform=steam", headers=HEADERS).json()
                  for g in gp_res:
                      if g.get('type') == 'Game':
                          match = re.search(r'app/(\d+)', g.get('open_giveaway_url', ''))
                          if match:
                              s_info = get_steam_details(match.group(1))
                              if s_info:
                                  final_active.append({
                                      "steam_id": match.group(1), "zh_title": s_info['name'],
                                      "thumbnail": s_info['image'], "end_date": s_info['end_date'],
                                      "short_description": s_info['desc'], "open_giveaway_url": g.get('open_giveaway_url')
                                  })
              except: pass

              epic_active, epic_upcoming = fetch_epic_official()
              final_active.extend(epic_active)

              upload_to_api("games.json", final_active)
              upload_to_api("upcoming.json", epic_upcoming)
              upload_to_api("intel.json", {"to_paid": final_to_paid, "free_weekend": final_weekend})
              print("🎉 Done!")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add *.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Full auto time & desc detection" && git push)
