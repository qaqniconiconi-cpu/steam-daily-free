name: Update Free Games

on:
  schedule:
    - cron: '0 */4 * * *' # 每4小时运行一次
  workflow_dispatch:      # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Data
        run: |
          # 1. 抓取 Steam 数据
          curl "https://www.gamerpower.com/api/giveaways?platform=steam&type=game&sort-by=value" -o steam.json
          
          # 2. 抓取 Epic 数据
          curl "https://www.gamerpower.com/api/giveaways?platform=epic-games-store&type=game&sort-by=value" -o epic.json

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add steam.json epic.json
          # 如果有变化才提交，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Steam and Epic games" && git push)
