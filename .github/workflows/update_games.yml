name: Update Games (Strict Filter & Translate)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # ⚡ 增加 deep-translator 用于翻译游戏名
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          from urllib.parse import quote
          from deep_translator import GoogleTranslator

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          }

          def get_clean_title(title):
              """去掉 '(Steam) Giveaway' 这种后缀，只保留纯游戏名"""
              return re.split(r'\(Steam|\(Epic', title, flags=re.IGNORECASE)[0].strip()

          def translate_to_zh(text):
              """调用谷歌翻译，将英文转为中文"""
              try:
                  return GoogleTranslator(source='auto', target='zh-CN').translate(text)
              except Exception as e:
                  print(f"      ⚠️ 翻译失败: {e}")
                  return text # 翻译失败就返回英文原名

          def get_final_url(url):
              """获取重定向后的真实网址"""
              try:
                  res = requests.get(url, headers=HEADERS, allow_redirects=True, timeout=15)
                  return res.url
              except:
                  return url

          def search_steam_id(clean_title):
              try:
                  url = f"https://store.steampowered.com/api/storesearch/?term={quote(clean_title)}&l=english&cc=US"
                  data = requests.get(url, headers=HEADERS, timeout=5).json()
                  if data.get('total', 0) > 0:
                      return str(data['items'][0]['id'])
              except: pass
              return None

          def fetch_upcoming_epic():
              try:
                  # Epic 接口虽然带 locale=zh-CN，但很多游戏标题依然是英文，所以我们手动加一层翻译
                  url = "https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN"
                  res = requests.get(url, headers=HEADERS).json()
                  elements = res['data']['Catalog']['searchStore']['elements']
                  upcoming = []
                  for item in elements:
                      promos = item.get('promotions', {})
                      if promos and promos.get('upcomingPromotionalOffers'):
                          raw_title = item['title']
                          #对预告游戏的标题也进行翻译
                          print(f"  📅 正在处理预告: {raw_title}")
                          zh_title = translate_to_zh(raw_title)
                          
                          start_date = promos['upcomingPromotionalOffers'][0]['promotionalOffers'][0]['startDate']
                          img = item['keyImages'][0]['url'] if item.get('keyImages') else ""
                          
                          upcoming.append({
                              "title": raw_title,       # 原始英文名
                              "zh_title": zh_title,     # 翻译后的中文名
                              "image": img,
                              "start_date": start_date,
                              "platform": "Epic Games"
                          })
                  return upcoming
              except Exception as e:
                  print(f"  ❌ 抓取 Epic 预告失败: {e}")
                  return []

          def upload_to_api(filename, data):
              url = "https://system.et-api.com/v1/update/steam-daily-free"
              headers = {"filename": filename, "Content-Type": "application/json"}
              try:
                  res = requests.post(url, headers=headers, json=data, timeout=15)
                  print(f"📤 API 上传 [{filename}]: 状态码 {res.status_code}")
              except Exception as e:
                  print(f"❌ API 上传失败: {e}")

          def main():
              print("🚀 Starting Sync (Strict & Translate Edition)...")
              active_api = "https://www.gamerpower.com/api/giveaways?sort-by=value"
              raw_games = []
              
              for p in ['steam', 'epic-games-store']:
                  try:
                      res = requests.get(f"{active_api}&platform={p}", headers=HEADERS).json()
                      if isinstance(res, list): raw_games += res
                  except: pass

              processed = []
              for game in raw_games:
                  if game.get('type') != 'Game': continue

                  new_game = game.copy()
                  raw_title = game.get('title', '')
                  platforms = (game.get('platforms', '') or "").lower()
                  orig_url = game.get('open_giveaway_url', '')

                  clean_title = get_clean_title(raw_title)
                  print(f"  🔍 正在处理: {clean_title}")

                  # ⚡ 核心过滤：获取最终网址并严格审查
                  final_url = get_final_url(orig_url)

                  if 'steam' in platforms:
                      # 如果跳转后的网址不包含 steampowered.com，说明是第三方发Key，直接丢弃！
                      if 'steampowered.com' not in final_url:
                          print(f"      ⏭️ 剔除 (非Steam官方直领): {final_url}")
                          continue
                      
                      sid = search_steam_id(clean_title)
                      if sid: new_game['steam_id'] = sid
                      
                  elif 'epic' in platforms:
                      # 同样，Epic必须是在官方商店
                      if 'epicgames.com' not in final_url:
                          print(f"      ⏭️ 剔除 (非Epic官方直领): {final_url}")
                          continue
                          
                      match = re.search(r'/(p|product)/([a-zA-Z0-9\-\%]+)', final_url)
                      if match: new_game['epic_slug'] = match.group(2)

                  # 如果通过了严格审查且拿到了 ID，进行【翻译】并加入列表
                  if new_game.get('steam_id') or new_game.get('epic_slug'):
                      zh_title = translate_to_zh(clean_title)
                      new_game['zh_title'] = zh_title # 新增一个中文字段
                      new_game['clean_title'] = clean_title # 保留英文原名备用
                      processed.append(new_game)
                      print(f"      ✅ 成功收录: {zh_title} ({clean_title})")

                  time.sleep(1) # 礼貌防封

              # 备份本地并上传
              with open('games.json', 'w') as f: json.dump(processed, f, indent=2)
              upcoming_data = fetch_upcoming_epic()
              with open('upcoming.json', 'w') as f: json.dump(upcoming_data, f, indent=2)

              print("📡 正在同步数据到公司后端...")
              upload_to_api("games.json", processed)
              upload_to_api("upcoming.json", upcoming_data)
              print("🎉 任务完成！")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add games.json upcoming.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update games with translation and strict filters" && git push)
