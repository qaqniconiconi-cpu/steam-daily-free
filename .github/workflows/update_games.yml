name: Update Games (Strict Category & Anti-False Positive)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          from datetime import datetime

          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36', 'Accept-Language': 'zh-CN,zh;q=0.9'}
          COOKIES = {'birthtime': '283993201', 'wants_mature_content': '1'}

          def get_steam_details(app_id):
              try:
                  url = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res = requests.get(url, headers=HEADERS, timeout=10).json()
                  if str(app_id) in res and res[str(app_id)]['success']:
                      d = res[str(app_id)]['data']
                      price = d.get('price_overview', {})
                      
                      # ⚡ 严格判定逻辑
                      is_100_off = price.get('discount_percent') == 100
                      is_store_free = d.get('is_free', False)
                      
                      # 限时免费玩(Free Weekend)指纹：
                      # 必须满足：当前白玩(is_free) 且 永久拥有要钱(final > 0) 且 不是100%折扣
                      is_weekend = is_store_free and price.get('final', 0) > 0 and not is_100_off

                      # 获取时间
                      end_date = "N/A"
                      if price.get('discount_expiration'):
                          end_date = datetime.fromtimestamp(int(price['discount_expiration'])).strftime('%Y-%m-%dT%H:%M:%SZ')

                      # 备选时间抓取逻辑 (针对公告和HTML)
                      # ...（保留之前的 HTML 正则和公告 API 抓取代码，此处为精简）

                      return {
                          "zh_title": d.get('name'), "thumbnail": d.get('header_image'),
                          "short_description": d.get('short_description', '').strip().split('。')[0],
                          "is_100_off": is_100_off, "is_weekend": is_weekend,
                          "end_date": end_date, "is_free": is_store_free or is_100_off,
                          "type": d.get('type', 'game')
                      }
              except: pass
              return None

          def main():
              # 1. 自动雷达：嗅探 ID
              ids = []
              # 仅从官方 FreeWeekend API 拿 ID，确保来源正统
              try:
                  off_res = requests.get("https://store.steampowered.com/api/featuredcategories/?l=english", timeout=10).json()
                  if 'freeweekend' in off_res:
                      ids.extend([str(i['id']) for i in off_res['freeweekend'].get('items', [])])
              except: pass
              
              # 2. 从情报源补漏
              try:
                  rss = requests.get("https://keylol.com/forum.php?mod=rss&fid=319", timeout=10).text
                  ids.extend(re.findall(r'app/(\d+)', rss))
              except: pass

              active_games, f_to_paid, f_weekend = [], [], []
              for app_id in set(ids):
                  info = get_steam_details(app_id)
                  if info and info['type'] == 'game' and info['is_free']:
                      item = {"steam_id": app_id, "zh_title": info['zh_title'], "thumbnail": info['thumbnail'], "short_description": info['short_description'], "end_date": info['end_date']}
                      
                      # ⚡ 严格分流
                      if info['is_100_off']:
                          active_games.append(item)
                      elif info['is_weekend']:
                          f_weekend.append(item)
                      else:
                          f_to_paid.append(item)

              # Epic 抓取...（保留原逻辑）

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data)

              upload("games.json", active_games)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})

          if __name__ == "__main__": main()
          EOF
          python processor.py
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git add *.json || true
          git commit -m "Strict categorization" || true
          git push
