name: Update Games (Smart Memory & Full Auto)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run Smart Processor
        run: |
          cat <<EOF > processor.py
          import requests
          import json
          import re
          import time
          import xml.etree.ElementTree as ET
          from urllib.parse import quote
          from datetime import datetime

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8'
          }

          def get_steam_details(app_id):
              try:
                  url_zh = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=schinese&cc=CN"
                  res_zh = requests.get(url_zh, headers=HEADERS, timeout=10).json()
                  url_en = f"https://store.steampowered.com/api/appdetails?appids={app_id}&l=english"
                  res_en = requests.get(url_en, headers=HEADERS, timeout=10).json()

                  if str(app_id) in res_zh and res_zh[str(app_id)]['success']:
                      d = res_zh[str(app_id)]['data']
                      d_en = res_en[str(app_id)]['data'] if str(app_id) in res_en else {}
                      
                      # ⚡ 核心扫描：免费授权包 (限时试玩) 与 100%折扣 (喜加一)
                      is_free_license = False
                      for group in d.get('package_groups', []):
                          for sub in group.get('subs', []):
                              if sub.get('is_free_license') == True:
                                  is_free_license = True
                                  break

                      price_info = d.get('price_overview', {})
                      is_100_off = price_info.get('discount_percent') == 100
                      is_currently_free = d.get('is_free', False) or is_100_off or is_free_license

                      # 时间抓取
                      end_date = "N/A"
                      expiry_ts = price_info.get('discount_expiration')
                      if expiry_ts:
                          end_date = datetime.fromtimestamp(int(expiry_ts)).strftime('%Y-%m-%dT%H:%M:%SZ')

                      # 描述与关键词识别
                      desc = d.get('short_description', '')
                      clean_desc = re.sub('<[^<]+?>', '', desc).replace('\r', '').replace('\n', '').strip()
                      is_weekend_kw = any(kw in clean_desc.lower() for kw in ['免费周末', '免费试玩', 'free weekend'])

                      return {
                          "zh_title": d.get('name'),
                          "en_title": d_en.get('name', d.get('name')),
                          "thumbnail": d.get('header_image'),
                          "short_description": clean_desc.split('。')[0] if '。' in clean_desc else clean_desc,
                          "is_free": is_currently_free,
                          "is_100_off": is_100_off,
                          "is_weekend": is_weekend_kw or is_free_license,
                          "end_date": end_date,
                          "type": d.get('type', 'game')
                      }
              except: pass
              return None

          def fetch_rss_ids():
              ids = []
              sources = ["https://www.reddit.com/r/FreeGameFindings/new.rss", "https://www.reddit.com/r/GameDeals/new.rss", "https://keylol.com/forum.php?mod=rss&fid=319"]
              for url in sources:
                  try:
                      res = requests.get(url, headers=HEADERS, timeout=15)
                      ids.extend(re.findall(r'app/(\d+)', res.text))
                  except: pass
              return list(set(ids))

          def main():
              print("🚀 启动具有【长期记忆】的深度情报引擎...")
              
              # 1. ⚡ 记忆系统：读取旧数据，防止帖子被顶下去导致游戏消失
              existing_ids = []
              try:
                  old_data = requests.get("https://system.et-api.com/v1/get/steam-daily-free?filename=intel.json", headers=HEADERS, timeout=10).json()
                  existing_ids.extend([i['steam_id'] for i in old_data.get('to_paid', [])])
                  existing_ids.extend([i['steam_id'] for i in old_data.get('free_weekend', [])])
              except: pass

              # 2. ⚡ 获取最新 RSS 数据
              new_ids = fetch_rss_ids()
              
              # 合并新老 ID，自动去重（绝不写死任何 ID）
              probe_ids = list(set(existing_ids + new_ids))
              probe_ids = [uid for uid in probe_ids if uid]
              
              rss_active_games, f_to_paid, f_weekend = [], [], []
              for app_id in probe_ids:
                  info = get_steam_details(app_id)
                  # ⚡ 自动淘汰：只保留 Type是Game 且 目前还在免费期的游戏
                  if info and info['is_free'] and info['type'] == 'game':
                      item = {"steam_id": str(app_id), "zh_title": info['zh_title'], "en_title": info['en_title'], "thumbnail": info['thumbnail'], "short_description": info['short_description'], "end_date": info['end_date']}
                      
                      # 智能分流
                      if info['is_100_off']:
                          # 100%折扣是真正的喜加一，转入主站区域
                          rss_active_games.append({**item, "open_giveaway_url": f"https://store.steampowered.com/app/{app_id}"})
                      elif info['is_weekend']:
                          f_weekend.append(item)
                      else:
                          f_to_paid.append(item)

              # 3. 处理常规 Steam 喜加一
              active_games = []
              active_games.extend(rss_active_games)
              try:
                  gp = requests.get("https://www.gamerpower.com/api/giveaways?platform=steam", headers=HEADERS).json()
                  for g in gp:
                      if g.get('type') == 'Game':
                          m = re.search(r'app/(\d+)', g.get('open_giveaway_url', ''))
                          if m:
                              app_id = m.group(1)
                              # 去重：如果 RSS 已经抓到了，就不重复添加
                              if any(x['steam_id'] == app_id for x in active_games): continue
                              
                              s = get_steam_details(app_id)
                              # 修复了之前此处的变量覆盖 Bug
                              if s and s['type'] == 'game' and s['is_100_off']: 
                                  active_games.append({
                                      "steam_id": app_id, "zh_title": s['zh_title'], "en_title": s['en_title'], 
                                      "thumbnail": s['thumbnail'], "short_description": s['short_description'], 
                                      "end_date": s['end_date'], "open_giveaway_url": g.get('open_giveaway_url')
                                  })
              except: pass

              # 4. Epic 官方数据
              upcoming_list = []
              try:
                  res = requests.get("https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN", headers=HEADERS).json()
                  for item in res['data']['Catalog']['searchStore']['elements']:
                      promos = item.get('promotions')
                      if not promos: continue
                      img = next((i['url'] for i in item.get('keyImages', []) if i['type'] in ['OfferImageWide', 'Thumbnail']), "")
                      slug = item.get('productSlug') or item.get('urlSlug')
                      if promos.get('promotionalOffers'):
                          offers = promos['promotionalOffers'][0]['promotionalOffers']
                          if offers and offers[0].get('discountSetting', {}).get('discountPercentage') == 0:
                              active_games.append({"zh_title": item['title'], "en_title": item['title'], "thumbnail": img, "end_date": offers[0]['endDate'], "epic_slug": slug, "short_description": "Epic 平台限时免费领取"})
                      elif promos.get('upcomingPromotionalOffers'):
                          offers = promos['upcomingPromotionalOffers'][0]['promotionalOffers']
                          if offers:
                              upcoming_list.append({"zh_title": item['title'], "image": img, "start_date": offers[0]['startDate'], "platform": "Epic Games", "short_description": "即将开启免费领取"})
              except: pass

              def upload(fn, data):
                  requests.post("https://system.et-api.com/v1/update/steam-daily-free", headers={"filename": fn, "Content-Type": "application/json"}, json=data, timeout=15)

              upload("games.json", active_games)
              upload("upcoming.json", upcoming_list)
              upload("intel.json", {"to_paid": f_to_paid, "free_weekend": f_weekend})
              print("🎉 系统更新完毕！长久记忆模块已生效！")

          if __name__ == "__main__":
              main()
          EOF

          python processor.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add *.json || true
          git commit -m "Add Memory System & Auto Pruning" || true
          git push
